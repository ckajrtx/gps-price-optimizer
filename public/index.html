<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuoteIQ — Sign In</title>
  <link rel="stylesheet" href="/css/shared.css">
  <style>
    body { background: linear-gradient(135deg, #EFF6FF 0%, #F8FAFC 50%, #F1F5F9 100%); display:flex; align-items:center; justify-content:center; min-height:100vh; }
    .login-wrap { width:100%; max-width:420px; padding:24px; }
    .logo { text-align:center; margin-bottom:32px; }
    .logo .brand { font-size:26px; font-weight:700; color:#1E293B; letter-spacing:-0.5px; }
    .logo .brand span { color:#2563EB; }
    .logo .tagline { font-size:13px; color:#64748B; margin-top:4px; }
    .auth-card { background:#fff; border-radius:12px; padding:28px; box-shadow:0 4px 24px rgba(0,0,0,.09); border:1px solid #E2E8F0; }
    .auth-card h2 { margin:0 0 20px; font-size:18px; font-weight:700; color:#1E293B; }
    .google-btn { width:100%; display:flex; align-items:center; justify-content:center; gap:10px; padding:10px; border:1px solid #E2E8F0; border-radius:6px; background:#fff; cursor:pointer; font-family:inherit; font-size:13px; font-weight:500; color:#1E293B; transition:background .15s; margin-bottom:4px; }
    .google-btn:hover { background:#F8FAFC; }
    .google-btn svg { width:18px; height:18px; flex-shrink:0; }
    .forgot-link { font-size:12px; color:#2563EB; text-decoration:none; float:right; margin-top:-2px; }
    .forgot-link:hover { text-decoration:underline; }
    #forgot-section { display:none; }
    .back-link { font-size:12px; color:#2563EB; cursor:pointer; display:inline-flex; align-items:center; gap:4px; margin-bottom:16px; }
    .back-link:hover { text-decoration:underline; }
    .footer-note { text-align:center; font-size:12px; color:#94A3B8; margin-top:20px; }
    #error-banner { display:none; margin-bottom:14px; }
  </style>
</head>
<body>
<div class="login-wrap">
  <div class="logo">
    <div class="brand">Quote<span>IQ</span></div>
    <div class="tagline">Location-Based Pricing Optimizer</div>
  </div>

  <div class="auth-card">
    <!-- SIGN IN SECTION -->
    <div id="signin-section">
      <h2>Sign in to your account</h2>
      <div id="error-banner" class="alert alert-error"></div>

      <button class="google-btn" onclick="handleGoogle()">
        <svg viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9.1 3.2l6.8-6.8C35.8 2.4 30.2 0 24 0 14.7 0 6.7 5.4 2.9 13.3l7.9 6.1C12.7 13 17.9 9.5 24 9.5z"/><path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.5 2.9-2.2 5.3-4.7 6.9l7.3 5.7c4.3-4 6.8-9.8 6.8-16.1h-.6z"/><path fill="#FBBC05" d="M10.8 28.6A14.5 14.5 0 0 1 9.5 24c0-1.6.3-3.1.7-4.6L2.3 13.3A24 24 0 0 0 0 24c0 3.9.9 7.5 2.5 10.8l8.3-6.2z"/><path fill="#34A853" d="M24 48c6.3 0 11.6-2.1 15.5-5.7l-7.3-5.7c-2 1.4-4.7 2.2-8.2 2.2-6.1 0-11.3-4.1-13.2-9.7l-7.9 6.1C6.7 42.6 14.7 48 24 48z"/></svg>
        Continue with Google
      </button>

      <div class="divider">or sign in with email</div>

      <form onsubmit="handleSignIn(event)">
        <div class="field">
          <label>Email address</label>
          <input type="email" id="si-email" required autocomplete="username">
        </div>
        <div class="field">
          <label>
            Password
            <a class="forgot-link" href="#" onclick="showForgot(event)">Forgot password?</a>
          </label>
          <input type="password" id="si-password" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary btn-full" id="si-btn">Sign In</button>
      </form>
    </div>

    <!-- FORGOT PASSWORD SECTION -->
    <div id="forgot-section">
      <div class="back-link" onclick="showSignIn()">← Back to sign in</div>
      <h2>Reset your password</h2>
      <div id="forgot-success" class="alert alert-success" style="display:none">
        Password reset email sent! Check your inbox.
      </div>
      <div id="forgot-error" class="alert alert-error" style="display:none"></div>
      <form onsubmit="handleForgot(event)">
        <div class="field">
          <label>Email address</label>
          <input type="email" id="fp-email" required>
        </div>
        <button type="submit" class="btn btn-primary btn-full">Send Reset Email</button>
      </form>
    </div>
  </div>

  <div class="footer-note">By signing in you agree to our Terms of Service.</div>
</div>

<script type="module">
import { signIn, signInWithGoogle, resetPassword, onAuthStateChanged, auth, getUserDoc } from '/js/auth.js';

// If already logged in, redirect
onAuthStateChanged(auth, async (user) => {
  if (user) {
    const userDoc = await getUserDoc(user.uid);
    if (userDoc && userDoc.status === 'active') {
      window.location.href = userDoc.role === 'superuser' ? '/admin.html' : '/app.html';
    }
  }
});

// Check for error param (e.g. deactivated account)
const params = new URLSearchParams(window.location.search);
if (params.get('error') === 'inactive') {
  showError('Your account has been deactivated. Contact your administrator.');
}

function showError(msg) {
  const el = document.getElementById('error-banner');
  el.textContent = msg; el.style.display = 'flex';
}

window.handleSignIn = async (e) => {
  e.preventDefault();
  const btn = document.getElementById('si-btn');
  btn.disabled = true; btn.textContent = 'Signing in…';
  try {
    await signIn(document.getElementById('si-email').value, document.getElementById('si-password').value);
  } catch (err) {
    showError(friendlyError(err.code));
    btn.disabled = false; btn.textContent = 'Sign In';
  }
};

window.handleGoogle = async () => {
  try {
    await signInWithGoogle();
  } catch (err) {
    showError(friendlyError(err.code));
  }
};

window.showForgot = (e) => {
  e.preventDefault();
  document.getElementById('signin-section').style.display = 'none';
  document.getElementById('forgot-section').style.display = 'block';
};
window.showSignIn = () => {
  document.getElementById('forgot-section').style.display = 'none';
  document.getElementById('signin-section').style.display = 'block';
};

window.handleForgot = async (e) => {
  e.preventDefault();
  try {
    await resetPassword(document.getElementById('fp-email').value);
    document.getElementById('forgot-success').style.display = 'flex';
    document.getElementById('forgot-error').style.display = 'none';
  } catch (err) {
    const el = document.getElementById('forgot-error');
    el.textContent = friendlyError(err.code); el.style.display = 'flex';
  }
};

function friendlyError(code) {
  const map = {
    'auth/invalid-credential': 'Invalid email or password.',
    'auth/user-not-found': 'No account found with that email.',
    'auth/wrong-password': 'Incorrect password.',
    'auth/too-many-requests': 'Too many attempts. Try again later.',
    'auth/popup-closed-by-user': 'Sign-in popup was closed.',
  };
  return map[code] || 'Sign-in failed. Please try again.';
}
</script>
</body>
</html>
