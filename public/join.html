<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuoteIQ — Accept Invitation</title>
  <link rel="stylesheet" href="/css/shared.css">
  <style>
    body { background:linear-gradient(135deg,#EFF6FF 0%,#F8FAFC 50%,#F1F5F9 100%); display:flex; align-items:center; justify-content:center; min-height:100vh; }
    .wrap { width:100%; max-width:440px; padding:24px; }
    .logo { text-align:center; margin-bottom:28px; }
    .logo .brand { font-size:24px; font-weight:700; }
    .logo .brand span { color:#2563EB; }
    .card { background:#fff; border-radius:12px; padding:28px; box-shadow:0 4px 24px rgba(0,0,0,.09); border:1px solid #E2E8F0; }
    .invite-meta { background:#F8FAFC; border:1px solid #E2E8F0; border-radius:6px; padding:12px 14px; margin-bottom:20px; font-size:13px; }
    .invite-meta .label { color:#64748B; font-size:11px; font-weight:600; text-transform:uppercase; margin-bottom:2px; }
    .invite-meta .value { color:#1E293B; font-weight:500; }
    .google-btn { width:100%; display:flex; align-items:center; justify-content:center; gap:10px; padding:10px; border:1px solid #E2E8F0; border-radius:6px; background:#fff; cursor:pointer; font-family:inherit; font-size:13px; font-weight:500; color:#1E293B; transition:background .15s; }
    .google-btn:hover { background:#F8FAFC; }
    .google-btn svg { width:18px; height:18px; }
    #loading-state, #error-state, #success-state, #form-state { display:none; }
    #loading-state.show, #error-state.show, #success-state.show, #form-state.show { display:block; }
  </style>
</head>
<body>
<div class="wrap">
  <div class="logo"><div class="brand">Quote<span>IQ</span></div></div>
  <div class="card">

    <div id="loading-state" class="show" style="text-align:center;padding:30px 0">
      <div class="spinner" style="margin:0 auto 12px"></div>
      <div style="color:#64748B;font-size:13px">Loading your invitation…</div>
    </div>

    <div id="error-state">
      <div class="alert alert-error" id="err-msg"></div>
      <a href="/index.html" class="btn btn-outline btn-full">Back to Sign In</a>
    </div>

    <div id="success-state" style="text-align:center;padding:20px 0">
      <div style="font-size:40px;margin-bottom:12px">✅</div>
      <h2 style="margin:0 0 8px;font-size:18px">Account created!</h2>
      <p style="color:#64748B;font-size:13px;margin:0 0 20px">You're all set. Redirecting to your workspace…</p>
    </div>

    <div id="form-state">
      <h2 style="margin:0 0 6px;font-size:18px;font-weight:700">Accept your invitation</h2>
      <p style="color:#64748B;font-size:13px;margin:0 0 18px">Create your account to join your team on QuoteIQ.</p>

      <div class="invite-meta">
        <div class="label">Invited to company</div>
        <div class="value" id="company-name">—</div>
      </div>

      <button class="google-btn" onclick="handleGoogle()" style="margin-bottom:16px">
        <svg viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9.1 3.2l6.8-6.8C35.8 2.4 30.2 0 24 0 14.7 0 6.7 5.4 2.9 13.3l7.9 6.1C12.7 13 17.9 9.5 24 9.5z"/><path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.5 2.9-2.2 5.3-4.7 6.9l7.3 5.7c4.3-4 6.8-9.8 6.8-16.1h-.6z"/><path fill="#FBBC05" d="M10.8 28.6A14.5 14.5 0 0 1 9.5 24c0-1.6.3-3.1.7-4.6L2.3 13.3A24 24 0 0 0 0 24c0 3.9.9 7.5 2.5 10.8l8.3-6.2z"/><path fill="#34A853" d="M24 48c6.3 0 11.6-2.1 15.5-5.7l-7.3-5.7c-2 1.4-4.7 2.2-8.2 2.2-6.1 0-11.3-4.1-13.2-9.7l-7.9 6.1C6.7 42.6 14.7 48 24 48z"/></svg>
        Continue with Google
      </button>

      <div class="divider">or create with email</div>

      <div id="form-error" class="alert alert-error" style="display:none;margin-bottom:12px"></div>

      <form onsubmit="handleCreate(event)">
        <div class="field">
          <label>Full Name</label>
          <input type="text" id="j-name" required placeholder="Jane Smith">
        </div>
        <div class="field">
          <label>Email address</label>
          <input type="email" id="j-email" required readonly style="background:#F8FAFC">
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" id="j-password" required minlength="8" placeholder="At least 8 characters">
        </div>
        <div class="field">
          <label>Confirm Password</label>
          <input type="password" id="j-confirm" required placeholder="Repeat password">
        </div>
        <button type="submit" class="btn btn-primary btn-full" id="j-btn">Create Account</button>
      </form>
    </div>

  </div>
</div>

<script type="module">
import { createUserFromInvite, signInWithGoogle, auth, getUserDoc, onAuthStateChanged } from '/js/auth.js';
import { getInvite, markInviteUsed, getCompany } from '/js/db.js';
import { doc, setDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';
import { db } from '/js/firebase-init.js';

const params = new URLSearchParams(window.location.search);
const token  = params.get('token');

let inviteData = null;

async function init() {
  if (!token) return showError('No invitation token found.');
  try {
    inviteData = await getInvite(token);
    if (!inviteData)         return showError('Invitation not found or expired.');
    if (inviteData.used)     return showError('This invitation has already been used.');
    const exp = inviteData.expiresAt?.toDate?.() || new Date(inviteData.expiresAt);
    if (exp < new Date())    return showError('This invitation has expired. Ask your admin to resend.');

    // Load company name
    const company = await getCompany(inviteData.companyId);
    document.getElementById('company-name').textContent = company?.name || inviteData.companyId;
    document.getElementById('j-email').value = inviteData.email || '';

    show('form-state');
  } catch (e) {
    showError('Failed to load invitation: ' + e.message);
  }
}

function show(id) {
  ['loading-state','error-state','success-state','form-state'].forEach(s => {
    document.getElementById(s).classList.toggle('show', s === id);
  });
}
function showError(msg) {
  document.getElementById('err-msg').textContent = msg;
  show('error-state');
}

async function finishSignup(firebaseUser) {
  await setDoc(doc(db, 'users', firebaseUser.uid), {
    email:       firebaseUser.email,
    displayName: firebaseUser.displayName || firebaseUser.email,
    companyId:   inviteData.companyId,
    role:        inviteData.role || 'user',
    status:      'active',
    createdAt:   serverTimestamp(),
    invitedBy:   inviteData.createdBy || null
  });
  await markInviteUsed(token);
  show('success-state');
  setTimeout(() => { window.location.href = '/app.html'; }, 2000);
}

window.handleCreate = async (e) => {
  e.preventDefault();
  const pw = document.getElementById('j-password').value;
  const cf = document.getElementById('j-confirm').value;
  if (pw !== cf) return showFormError('Passwords do not match.');
  const btn = document.getElementById('j-btn');
  btn.disabled = true; btn.textContent = 'Creating account…';
  try {
    const user = await createUserFromInvite(
      document.getElementById('j-email').value,
      pw,
      document.getElementById('j-name').value,
      inviteData
    );
    await markInviteUsed(token);
    show('success-state');
    setTimeout(() => { window.location.href = '/app.html'; }, 2000);
  } catch (err) {
    showFormError(err.message);
    btn.disabled = false; btn.textContent = 'Create Account';
  }
};

window.handleGoogle = async () => {
  try {
    const cred = await signInWithGoogle();
    await finishSignup(cred);
  } catch (e) { showFormError(e.message); }
};

function showFormError(msg) {
  const el = document.getElementById('form-error');
  el.textContent = msg; el.style.display = 'flex';
}

init();
</script>
</body>
</html>
